# hospital-b-mongodb — MongoDB StatefulSet + Service
# Phase 8 — M1 MacBook Air resources: 128Mi/256Mi, 100m/250m
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hospital-b-mongodb
  namespace: health-bridge
  labels:
    app: hospital-b-mongodb
    app.kubernetes.io/part-of: health-bridge
spec:
  serviceName: hospital-b-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: hospital-b-mongodb
  template:
    metadata:
      labels:
        app: hospital-b-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: hospital-b-mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: hospital-b-mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-b-mongodb
  namespace: health-bridge
  labels:
    app: hospital-b-mongodb
    app.kubernetes.io/part-of: health-bridge
spec:
  selector:
    app: hospital-b-mongodb
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
