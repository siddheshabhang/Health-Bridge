# CORS Config
# Phase 8 — Kubernetes, Ingress & Secrets
#
# Frontends are served through NGINX Ingress at the Minikube IP.
# Replace MINIKUBE_IP with the output of: minikube ip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cors-config
  namespace: health-bridge
  labels:
    app.kubernetes.io/part-of: health-bridge
data:
  CORS_ALLOWED_ORIGIN_PATTERNS: >-
    http://localhost:5173,
    http://localhost:5174,
    http://localhost:5175,
    http://192.168.49.2,
    http://192.168.49.2:*
