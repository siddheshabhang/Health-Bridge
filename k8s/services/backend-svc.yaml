# Backend ClusterIP Services
# Phase 8 — Kubernetes, Ingress & Secrets
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: health-bridge
  labels:
    app: discovery-server
    app.kubernetes.io/part-of: health-bridge
spec:
  selector:
    app: discovery-server
  ports:
    - name: http
      port: 8761
      targetPort: 8761
