# api-gateway-service Deployment
# Phase 8 — M1 MacBook Air resources: 128Mi/256Mi, 100m/250m
# Image: siddheshhh/health-bridge-api-gateway-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-service
  namespace: health-bridge
  labels:
    app: api-gateway-service
    app.kubernetes.io/part-of: health-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-service
  template:
    metadata:
      labels:
        app: api-gateway-service
    spec:
      containers:
        - name: api-gateway-service
          image: siddheshhh/health-bridge-api-gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: eureka-config
            - configMapRef:
                name: cors-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
