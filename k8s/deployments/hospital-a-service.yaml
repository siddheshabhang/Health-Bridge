# hospital-a-service Deployment
# Phase 8 — M1 MacBook Air resources: 192Mi/384Mi, 100m/250m
# Image: siddheshhh/health-bridge-hospital-a-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-a-service
  namespace: health-bridge
  labels:
    app: hospital-a-service
    app.kubernetes.io/part-of: health-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-a-service
  template:
    metadata:
      labels:
        app: hospital-a-service
    spec:
      containers:
        - name: hospital-a-service
          image: siddheshhh/health-bridge-hospital-a-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: HOSPITAL_A_DB_URL
              value: "jdbc:postgresql://hospital-a-db:5432/hospital_a_db"
            - name: HOSPITAL_A_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: POSTGRES_USER
            - name: HOSPITAL_A_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: INTERNAL_SERVICE_TOKEN
          envFrom:
            - configMapRef:
                name: eureka-config
            - configMapRef:
                name: cors-config
            - configMapRef:
                name: service-urls-config
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
