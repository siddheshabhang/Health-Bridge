# admin-reporting-service Deployment
# Phase 8 — M1 MacBook Air resources: 128Mi/256Mi, 100m/250m
# Image: siddheshhh/health-bridge-admin-reporting-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-reporting-service
  namespace: health-bridge
  labels:
    app: admin-reporting-service
    app.kubernetes.io/part-of: health-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-reporting-service
  template:
    metadata:
      labels:
        app: admin-reporting-service
    spec:
      containers:
        - name: admin-reporting-service
          image: siddheshhh/health-bridge-admin-reporting-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: ADMIN_REPORTING_DB_URL
              value: "jdbc:postgresql://notification-audit-db:5432/notification_audit_db"
            - name: ADMIN_REPORTING_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: POSTGRES_USER
            - name: ADMIN_REPORTING_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: eureka-config
            - configMapRef:
                name: cors-config
            - configMapRef:
                name: service-urls-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
