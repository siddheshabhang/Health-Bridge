# auth-identity-service Deployment
# Phase 8 — M1 MacBook Air resources: 192Mi/384Mi, 100m/250m
# Image: siddheshhh/health-bridge-auth-identity-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-identity-service
  namespace: health-bridge
  labels:
    app: auth-identity-service
    app.kubernetes.io/part-of: health-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-identity-service
  template:
    metadata:
      labels:
        app: auth-identity-service
    spec:
      containers:
        - name: auth-identity-service
          image: siddheshhh/health-bridge-auth-identity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: AUTH_IDENTITY_DB_URL
              value: "jdbc:postgresql://auth-identity-db:5432/auth_identity_db"
            - name: AUTH_IDENTITY_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: POSTGRES_USER
            - name: AUTH_IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-bridge-secrets
                  key: INTERNAL_SERVICE_TOKEN
          envFrom:
            - configMapRef:
                name: eureka-config
            - configMapRef:
                name: cors-config
            - configMapRef:
                name: service-urls-config
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
