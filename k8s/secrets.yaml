# health-bridge Secrets
# Phase 8 — Kubernetes, Ingress & Secrets
#
# IMPORTANT: Replace stringData values before applying to production.
# Generate values:
#   POSTGRES_USER/PASS  : choose your own
#   JWT_SECRET          : openssl rand -base64 32
#   INTERNAL_SERVICE_TOKEN: openssl rand -base64 32
---
apiVersion: v1
kind: Secret
metadata:
  name: health-bridge-secrets
  namespace: health-bridge
  labels:
    app.kubernetes.io/part-of: health-bridge
type: Opaque
stringData:
  POSTGRES_USER: "fhir_user"
  POSTGRES_PASSWORD: "fhir_pass"
  JWT_SECRET: "change-me-to-a-256-bit-base64-secret-in-prod-at-least-32-chars"
  INTERNAL_SERVICE_TOKEN: "change-me-before-service-splitting"
